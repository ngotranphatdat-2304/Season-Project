spring.application.name=season

server.port=${PORT:3001}
# ==========================================
# 1. CẤU HÌNH MONGODB (Đã tối ưu theo chuẩn mới của Spring Boot)
# ==========================================
spring.mongodb.uri=${MONGO_URI}
spring.mongodb.database=${MONGO_DB}

# ==========================================
# 2. CẤU HÌNH BẢO MẬT & CORS (Custom Properties - Bỏ qua cảnh báo của VSCode)
# ==========================================
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# ==========================================
# 3. CẤU HÌNH JWT (Custom Properties - Bỏ qua cảnh báo của VSCode)
# ==========================================
app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET}
app.jwt.access-ttl=${JWT_ACCESS_TTL:3600}
app.jwt.refresh-ttl=${JWT_REFRESH_TTL:604800}
app.jwt.issuer=${JWT_ISSUER:season}
app.jwt.audience=${JWT_AUDIENCE:season}

# ==========================================
# 4. CẤU HÌNH ADMIN SECRET (Custom Properties - Bỏ qua cảnh báo của VSCode)
# ==========================================
app.admin.registration-secret=${ADMIN_REGISTRATION_SECRET:admin_secret_key}

# ==========================================
# 5. CẤU HÌNH MAIL GMAIL (OAUTH2) (Custom Properties - Bỏ qua cảnh báo của VSCode)
# ==========================================
spring.mail.username=${GMAIL_USER:}
app.gmail.client-id=${GMAIL_CLIENT_ID:}
app.gmail.client-secret=${GMAIL_CLIENT_SECRET:}
app.gmail.refresh-token=${GMAIL_REFRESH_TOKEN:}

# ==========================================
# 6. CẤU HÌNH PAYOS & URL (Custom Properties - Bỏ qua cảnh báo của VSCode)
# ==========================================
app.backend.public-base-url=${BACKEND_PUBLIC_BASE_URL:}
app.frontend.public-base-url=${FRONTEND_PUBLIC_BASE_URL:http://localhost:3000}
app.payos.webhook-path=${PAYOS_WEBHOOK_PATH:/api/checkout/payos/webhook}