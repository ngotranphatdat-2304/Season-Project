spring.application.name=${SPRING_APPLICATION_NAME:season}

# Server
server.port=${PORT:3001}
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:4MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:8MB}

# MongoDB
spring.mongodb.uri=${MONGO_URI}
spring.mongodb.database=${MONGO_DB:test}

# CORS
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# JWT
app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET}
app.jwt.access-ttl=${JWT_ACCESS_TTL:3600}
app.jwt.refresh-ttl=${JWT_REFRESH_TTL:604800}
app.jwt.issuer=${JWT_ISSUER:season}
app.jwt.audience=${JWT_AUDIENCE:season}

# Admin
app.admin.registration-secret=${ADMIN_REGISTRATION_SECRET:}

# Gmail OAuth
spring.mail.username=${GMAIL_USER:}
app.gmail.client-id=${GMAIL_CLIENT_ID:}
app.gmail.client-secret=${GMAIL_CLIENT_SECRET:}
app.gmail.refresh-token=${GMAIL_REFRESH_TOKEN:}

# Public URLs and PayOS
app.backend.public-base-url=${BACKEND_PUBLIC_BASE_URL:}
app.frontend.public-base-url=${FRONTEND_PUBLIC_BASE_URL:http://localhost:3000}
app.payos.webhook-path=${PAYOS_WEBHOOK_PATH:/api/checkout/payos/webhook}

# AI try-on
app.try-on.provider=${TRY_ON_PROVIDER:qwen}
DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:}
DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:https://ws-r0m8w99r3jiepdm2.ap-southeast-1.maas.aliyuncs.com/api/v1}
QWEN_IMAGE_MODEL=${QWEN_IMAGE_MODEL:qwen-image-edit-plus}
QWEN_IMAGE_WATERMARK=${QWEN_IMAGE_WATERMARK:false}
QWEN_IMAGE_COUNT=${QWEN_IMAGE_COUNT:1}
TRY_ON_GLOBAL_LIMIT_PER_HOUR=${TRY_ON_GLOBAL_LIMIT_PER_HOUR:10}
TRY_ON_IP_LIMIT_PER_HOUR=${TRY_ON_IP_LIMIT_PER_HOUR:3}

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=${MONGO_TEMPLATE_LOG_LEVEL:DEBUG}
