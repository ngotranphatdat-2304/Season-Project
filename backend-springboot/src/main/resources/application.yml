spring:
  mongodb:
    uri: "${MONGO_URI:mongodb://localhost:27017}"
    database: "${MONGO_DB:myapp}"
  mail:
    host: smtp.gmail.com
    port: 587
    username: "${GMAIL_USER}"
    password: "${GMAIL_APP_PASSWORD}"
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true

server:
  port: ${PORT:3001}

app:
  env: "${NODE_ENV:development}"

  jwt:
    access-secret: "${JWT_ACCESS_SECRET}"
    refresh-secret: "${JWT_REFRESH_SECRET}"
    access-ttl: ${JWT_ACCESS_TTL_SECONDS:900} # 15 phut
    refresh-ttl: ${JWT_REFRESH_TTL_SECONDS:604800} # 7 ngay
    issuer: "${JWT_ISSUER:season-backend}"
    audience: "${JWT_AUDIENCE:season-api}"

  cors:
    # Có thể truyền danh sách domain phân tách bởi dấu phẩy, giống ALLOWED_ORIGINS bên Node
    allowed-origins: "${ALLOWED_ORIGINS:http://localhost:3000}"

  cloudinary:
    url: "${CLOUDINARY_URL:}"

  admin:
    registration-secret: "${ADMIN_REGISTRATION_SECRET:}"

  frontend:
    public-base-url: "${FRONTEND_PUBLIC_BASE_URL:}"

  backend:
    public-base-url: "${BACKEND_PUBLIC_BASE_URL:}"

  gmail:
    client-id: "${GMAIL_CLIENT_ID:}"
    client-secret: "${GMAIL_CLIENT_SECRET:}"
    refresh-token: "${GMAIL_REFRESH_TOKEN:}"

  payos:
    client-id: "${PAYOS_CLIENT_ID:}"
    api-key: "${PAYOS_API_KEY:}"
    checksum-key: "${PAYOS_CHECKSUM_KEY:}"
    fixed-qr-amount: ${PAYOS_FIXED_QR_AMOUNT:10000}
    webhook-path: "${PAYOS_WEBHOOK_PATH:/api/checkout/payos/webhook}"
